<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Taekwon-Do · Esame Cinture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#22c55e;--verde-d:#15a349;--blu:#3b82f6;--blu-d:#1d4ed8;
    --giallo:#fbbf24;--rosso:#ef4444;--ink:#1e293b;--ink-soft:#475569;
    --card:rgba(255,255,255,.88);--glass-brd:rgba(255,255,255,.6);--radius:26px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:"Nunito",system-ui,sans-serif;color:var(--ink);background:#0b1220;
    display:flex;align-items:center;justify-content:center;padding:18px;position:relative;overflow-x:hidden;}
  .bg{position:fixed;inset:0;z-index:-2;background:linear-gradient(135deg,#0e7a52,#0d6b8f 55%,#1e3a8a);}
  .blob{position:fixed;z-index:-1;border-radius:50%;filter:blur(70px);opacity:.55;animation:float 16s ease-in-out infinite;}
  .blob.b1{width:46vmax;height:46vmax;background:#22c55e;top:-14vmax;left:-12vmax;}
  .blob.b2{width:40vmax;height:40vmax;background:#3b82f6;bottom:-16vmax;right:-10vmax;animation-delay:-5s;}
  .blob.b3{width:30vmax;height:30vmax;background:#0ea5e9;top:30%;right:20%;animation-delay:-9s;opacity:.4;}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4vmax,-3vmax) scale(1.08)}}

  .app{width:100%;max-width:560px;background:var(--card);backdrop-filter:blur(18px) saturate(1.3);
    -webkit-backdrop-filter:blur(18px) saturate(1.3);border:1px solid var(--glass-brd);border-radius:var(--radius);
    box-shadow:0 30px 60px -15px rgba(0,0,0,.45);padding:26px 24px 28px;position:relative;animation:rise .5s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes rise{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}

  h1{font-family:"Baloo 2",cursive;font-weight:800;font-size:1.55rem;line-height:1.12;text-align:center;letter-spacing:.3px;}
  .grad{background:linear-gradient(90deg,var(--verde),var(--blu));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{text-align:center;color:var(--ink-soft);margin-top:7px;font-weight:600;font-size:.92rem;}
  .belt-hero{display:flex;justify-content:center;margin:2px 0;}
  .badge{width:90px;height:90px;filter:drop-shadow(0 8px 14px rgba(0,0,0,.25));animation:bob 3s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}

  .label{font-family:"Baloo 2";font-weight:700;color:var(--ink);font-size:.95rem;margin:16px 0 8px;display:flex;align-items:center;gap:7px;}
  .name-box{width:100%;padding:13px 16px;border:2px solid #e2e8f0;border-radius:16px;font-size:1.02rem;font-family:inherit;font-weight:700;text-align:center;background:#fff;color:var(--ink);transition:.2s;}
  .name-box::placeholder{color:#94a3b8;font-weight:600;}
  .name-box:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 4px rgba(59,130,246,.18);}

  .belt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:9px;}
  .belt-opt{background:#fff;border:2px solid #e7edf5;border-radius:16px;padding:9px 6px 8px;cursor:pointer;text-align:center;transition:transform .12s,border-color .15s,box-shadow .15s;font-family:"Baloo 2";font-weight:700;font-size:.76rem;color:var(--ink-soft);line-height:1.05;}
  .belt-opt:hover{transform:translateY(-2px);border-color:#cbd5e1;}
  .belt-opt.sel{border-color:var(--blu);box-shadow:0 8px 18px -8px rgba(59,130,246,.6);color:var(--ink);}
  .mini{height:16px;border-radius:6px;margin-bottom:6px;position:relative;overflow:hidden;border:1px solid rgba(0,0,0,.10);transition:.15s;}
  .mini .str{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:5px;}
  .belt-opt.sel .mini{transform:scale(1.05);}
  .belt-opt .tick{font-size:.66rem;color:var(--blu);opacity:0;margin-top:2px;}
  .belt-opt.sel .tick{opacity:1;}

  .diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .diff-opt{background:#fff;border:2px solid #e7edf5;border-radius:16px;padding:12px 6px;cursor:pointer;text-align:center;transition:transform .12s,border-color .15s,box-shadow .15s;}
  .diff-opt:hover{transform:translateY(-2px);border-color:#cbd5e1;}
  .diff-opt.sel{border-color:var(--verde);box-shadow:0 8px 18px -8px rgba(34,197,94,.6);}
  .diff-opt .em{font-size:1.5rem;}
  .diff-opt .nm{font-family:"Baloo 2";font-weight:800;font-size:.95rem;margin-top:2px;color:var(--ink);}
  .diff-opt .ds{font-size:.72rem;color:var(--ink-soft);font-weight:600;margin-top:2px;}

  button{cursor:pointer;border:none;font-family:"Baloo 2",cursive;font-weight:700;border-radius:18px;transition:transform .1s,box-shadow .2s,filter .2s;}
  button:active{transform:translateY(2px) scale(.99);}
  .cta{width:100%;margin-top:20px;padding:16px;font-size:1.2rem;color:#fff;background:linear-gradient(135deg,var(--verde),var(--blu));box-shadow:0 10px 22px -6px rgba(34,197,94,.55);letter-spacing:.4px;}
  .cta:hover{filter:brightness(1.06);}
  .cta.blu{background:linear-gradient(135deg,#60a5fa,var(--blu-d));box-shadow:0 10px 22px -6px rgba(37,99,235,.5);}
  .ghost{background:#eef2f7;color:var(--ink);box-shadow:none;}
  .ghost:hover{background:#e2e8f0;}
  .hint{font-size:.8rem;color:var(--ink-soft);text-align:center;margin-top:12px;font-weight:600;}

  /* ===== QUIZ ===== */
  .quiz-head{display:flex;justify-content:flex-start;margin-bottom:8px;}
  .restart-btn{background:#eef2f7;color:var(--ink);font-size:.82rem;padding:7px 13px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;}
  .restart-btn:hover{background:#e2e8f0;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
  .qnum{font-family:"Baloo 2";font-weight:700;color:var(--ink-soft);font-size:.92rem;}
  .beltTag{display:inline-flex;align-items:center;gap:6px;font-family:"Baloo 2";font-weight:700;font-size:.78rem;color:var(--ink);background:#fff;border:1px solid #e7edf5;border-radius:999px;padding:4px 10px;}
  .beltTag .dot,.lb-dot{width:22px;height:10px;border-radius:4px;position:relative;overflow:hidden;display:inline-block;flex:0 0 auto;}
  .beltTag .dot .str,.lb-dot .str{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:4px;}
  .score{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#fde68a,#fbbf24);color:#7c4a02;font-family:"Baloo 2";font-weight:800;padding:5px 12px;border-radius:999px;font-size:.92rem;box-shadow:0 4px 10px -3px rgba(251,191,36,.6);}

  .beltbar{margin:10px 0 2px;position:relative;}
  .belt-track{height:24px;border-radius:999px;background:repeating-linear-gradient(45deg,#e8edf3,#e8edf3 9px,#dfe6ee 9px,#dfe6ee 18px);border:1px solid #dbe3ec;overflow:hidden;}
  .belt-fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--verde),#14b8a6 55%,var(--blu));transition:width .5s cubic-bezier(.2,.9,.3,1);box-shadow:inset 0 -3px 6px rgba(0,0,0,.12);}
  .knot{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:1.3rem;transition:left .5s cubic-bezier(.2,.9,.3,1);filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));}
  .belt-pct{text-align:right;font-size:.72rem;color:var(--ink-soft);font-weight:700;margin-top:4px;}

  .timer{display:flex;align-items:center;gap:10px;margin-top:12px;}
  .timer-track{flex:1;height:12px;border-radius:999px;background:#e8edf3;overflow:hidden;border:1px solid #dbe3ec;}
  .timer-fill{height:100%;width:100%;border-radius:999px;background:var(--verde);transition:width .12s linear,background .25s;}
  .timer-num{font-family:"Baloo 2";font-weight:800;font-size:1.05rem;min-width:46px;text-align:center;padding:3px 0;border-radius:10px;background:#fff;border:1px solid #e7edf5;color:var(--ink);}
  .timer-num.warn{color:var(--rosso);animation:pulse .5s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

  .cat{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#dbeafe,#ede9fe);color:var(--blu-d);font-family:"Baloo 2";font-weight:700;padding:6px 14px;border-radius:999px;font-size:.82rem;margin:14px 0 2px;}
  .question{font-family:"Baloo 2";font-weight:700;font-size:1.28rem;line-height:1.3;margin:10px 0 4px;}

  .answers{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
  .ans{background:#fff;border:2px solid #e7edf5;border-radius:18px;padding:13px 15px;text-align:left;font-family:"Nunito";font-weight:700;font-size:1.02rem;color:var(--ink);display:flex;align-items:center;gap:12px;transition:transform .12s,border-color .15s,background .15s,box-shadow .15s;animation:slideIn .35s both;}
  .ans:hover:not(.locked){border-color:var(--blu);background:#f5f9ff;transform:translateX(4px);box-shadow:0 6px 16px -8px rgba(59,130,246,.6);}
  .ans .tag{flex:0 0 34px;width:34px;height:34px;border-radius:11px;background:#eef2f7;display:flex;align-items:center;justify-content:center;font-family:"Baloo 2";font-weight:800;color:#64748b;transition:.15s;}
  .ans .txt{flex:1;}
  .ans .mark{opacity:0;font-size:1.2rem;transition:.15s;}
  .ans.correct{border-color:var(--verde);background:#ecfdf3;}
  .ans.correct .tag{background:var(--verde);color:#fff;}
  .ans.correct .mark{opacity:1;}
  .ans.wrong{border-color:var(--rosso);background:#fef2f2;}
  .ans.wrong .tag{background:var(--rosso);color:#fff;}
  .ans.wrong .mark{opacity:1;}
  .ans.locked{cursor:default;}
  .ans.dim{opacity:.5;}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .feedback{margin-top:14px;border-radius:18px;padding:13px 16px;font-weight:700;font-size:.95rem;line-height:1.45;display:none;}
  .feedback.show{display:block;animation:pop .3s cubic-bezier(.2,.9,.3,1.3);}
  .feedback.good{background:#ecfdf3;border:2px solid var(--verde);color:#166534;}
  .feedback.bad{background:#fef2f2;border:2px solid var(--rosso);color:#991b1b;}
  .feedback .h{font-family:"Baloo 2";font-weight:800;font-size:1.05rem;display:block;margin-bottom:3px;}
  @keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}

  .next-btn{display:none;margin-top:14px;}
  .next-btn.show{display:block;}

  /* ===== FINE ===== */
  .ring-wrap{display:flex;justify-content:center;margin:6px 0 2px;}
  .end-title{font-family:"Baloo 2";font-weight:800;text-align:center;font-size:1.5rem;margin-top:6px;}
  .end-msg{text-align:center;color:var(--ink-soft);font-weight:600;font-size:1rem;margin:8px 6px 0;line-height:1.5;}
  .stars{text-align:center;font-size:1.7rem;letter-spacing:8px;margin:4px 0;}
  .row{display:flex;gap:12px;margin-top:18px;}
  .row button{flex:1;padding:14px;font-size:1.05rem;}

  /* classifica */
  .lb-title{font-family:"Baloo 2";font-weight:800;font-size:1.15rem;margin:20px 0 4px;display:flex;align-items:center;gap:8px;}
  .lb{display:flex;flex-direction:column;gap:7px;}
  .lb-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e7edf5;border-radius:14px;padding:9px 12px;font-weight:700;font-size:.9rem;}
  .lb-row.me{border-color:var(--verde);background:#ecfdf3;box-shadow:0 4px 12px -6px rgba(34,197,94,.6);}
  .lb-rank{font-family:"Baloo 2";font-weight:800;font-size:1rem;min-width:26px;text-align:center;}
  .lb-name{flex:1;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-meta{font-size:.72rem;color:var(--ink-soft);font-weight:600;}
  .lb-pts{font-family:"Baloo 2";font-weight:800;color:var(--blu-d);}
  .lb-empty{text-align:center;color:var(--ink-soft);font-weight:600;font-size:.9rem;padding:8px;}
  .lb-clear{display:block;margin:10px auto 0;background:transparent;color:#94a3b8;font-size:.8rem;font-family:"Nunito";font-weight:700;text-decoration:underline;}

  .review-btn{margin-top:14px;color:var(--ink);background:#eef2f7;box-shadow:none;}
  .review{margin-top:14px;background:#f8fafc;border:1.5px dashed #cbd5e1;border-radius:18px;padding:16px;font-size:.9rem;font-weight:600;color:var(--ink-soft);line-height:1.5;}
  .review b{color:var(--ink);}
  .hidden{display:none;}
  .mute{position:absolute;top:16px;right:16px;width:42px;height:42px;border-radius:14px;background:#fff;box-shadow:0 4px 12px -4px rgba(0,0,0,.3);font-size:1.15rem;display:flex;align-items:center;justify-content:center;z-index:6;border:1px solid #eef2f7;}
  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:50;}
  .screen{animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media(max-width:420px){h1{font-size:1.3rem}.question{font-size:1.12rem}.app{padding:22px 15px 24px}}
</style>
</head>
<body>
<div class="bg"></div><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<canvas id="confetti"></canvas>

<div class="app">
  <button class="mute" id="muteBtn" title="Suono on/off">🔊</button>

  <!-- ===== START ===== -->
  <section id="screen-start" class="screen">
    <div class="belt-hero">
      <svg class="badge" viewBox="0 0 100 100" aria-label="cintura">
        <defs><linearGradient id="gv" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f1f5f9"/><stop offset="1" stop-color="#e2e8f0"/></linearGradient></defs>
        <circle cx="50" cy="50" r="46" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
        <circle cx="50" cy="50" r="40" fill="url(#gv)"/>
        <text x="50" y="42" text-anchor="middle" font-size="26">🥋</text>
        <rect id="badgeBand" x="12" y="58" width="76" height="13" rx="3" fill="#22c55e"/>
        <rect id="badgeStripe" x="12" y="61.5" width="76" height="5" rx="2" fill="#1d4ed8" opacity="0"/>
      </svg>
    </div>
    <h1>Quiz <span class="grad">Esame Taekwon-Do</span></h1>
    <p class="sub">Scegli la cintura e il livello, poi vai! 🥋</p>

    <input id="playerName" class="name-box" maxlength="18" placeholder="Come ti chiami?" style="margin-top:14px;" />

    <div class="label">🎯 Per quale cintura fai l'esame?</div>
    <div class="belt-grid" id="beltGrid"></div>

    <div class="label">🔥 Livello di difficoltà</div>
    <div class="diff-grid" id="diffGrid"></div>

    <button class="cta" id="startBtn">▶ Inizia il quiz</button>
    <p class="hint">⏱️ Hai 10 secondi per ogni risposta. Pronto?</p>
  </section>

  <!-- ===== QUIZ ===== -->
  <section id="screen-quiz" class="screen hidden">
    <div class="quiz-head"><button class="restart-btn" id="restartBtn">↺ Ricomincia</button></div>
    <div class="topbar">
      <span class="qnum" id="qcounter">Domanda 1 / 15</span>
      <span class="beltTag" id="beltTag"></span>
      <span class="score" id="scorePill">⭐ 0</span>
    </div>
    <div class="beltbar">
      <div class="belt-track"><div class="belt-fill" id="beltFill"></div></div>
      <div class="knot" id="knot" style="left:0">🥋</div>
      <div class="belt-pct" id="beltPct">Cintura 0%</div>
    </div>
    <div class="timer">
      <div class="timer-track"><div class="timer-fill" id="timeFill"></div></div>
      <div class="timer-num" id="timeNum">10</div>
    </div>

    <span class="cat" id="catPill">Categoria</span>
    <div class="question" id="questionText">...</div>
    <div class="answers" id="answers"></div>

    <div class="feedback" id="feedback"></div>
    <button class="cta blu next-btn" id="nextBtn">Avanti →</button>
  </section>

  <!-- ===== END ===== -->
  <section id="screen-end" class="screen hidden">
    <div class="ring-wrap">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <defs><linearGradient id="ring" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22c55e"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs>
        <circle cx="75" cy="75" r="62" fill="none" stroke="#e9eef5" stroke-width="14"/>
        <circle id="ringFill" cx="75" cy="75" r="62" fill="none" stroke="url(#ring)" stroke-width="14"
                stroke-linecap="round" stroke-dasharray="389.6" stroke-dashoffset="389.6" transform="rotate(-90 75 75)"/>
        <text id="ringEmoji" x="75" y="66" text-anchor="middle" font-size="34">🥋</text>
        <text id="ringScore" x="75" y="98" text-anchor="middle" font-family="Baloo 2" font-weight="800" font-size="22" fill="#1e293b">0/15</text>
      </svg>
    </div>
    <div class="end-title" id="endTitle">Bravo!</div>
    <div class="stars" id="endStars">⭐⭐⭐</div>
    <div class="end-msg" id="endMsg"></div>
    <div class="row">
      <button class="cta" id="againBtn">🔄 Rigioca</button>
      <button class="ghost" id="homeBtn">🏠 Cambia cintura</button>
    </div>

    <div class="lb-title">🏁 Classifica</div>
    <div class="lb" id="leaderboard"></div>
    <button class="lb-clear" id="clearLbBtn">🗑️ Azzera classifica</button>

    <button class="ghost review-btn cta" id="reviewBtn">📖 Ripassa gli errori</button>
    <div id="reviewBox" class="review hidden"></div>
  </section>
</div>

<script>
/* ====== CINTURE (cumulative: la scelta include le forme fino a quel grado) ====== */
const BELTS=[
  {id:1,name:"Gialla",           main:"#fbbf24",stripe:null},
  {id:2,name:"Gialla superiore", main:"#fbbf24",stripe:"#22c55e"},
  {id:3,name:"Verde",            main:"#22c55e",stripe:null},
  {id:4,name:"Verde-Blu",        main:"#22c55e",stripe:"#1d4ed8"},
  {id:5,name:"Blu",              main:"#3b82f6",stripe:null},
  {id:6,name:"Blu superiore",    main:"#3b82f6",stripe:"#ef4444"},
  {id:7,name:"Rossa",            main:"#ef4444",stripe:null},
  {id:8,name:"Nera",             main:"#1f2937",stripe:null}
];
const DIFF={
  facile:   {nm:"Facile", em:"😊", ds:"10 domande",  maxLvl:1, count:10},
  medio:    {nm:"Medio",  em:"⚡", ds:"15 domande",  maxLvl:2, count:15},
  difficile:{nm:"Tosto",  em:"🔥", ds:"20 · tutte!", maxLvl:3, count:20}
};
const TIME_PER_Q=10;            // ⏱️ 10 secondi per risposta
const LB_KEY="tkd_quiz_lb_v1";

/* ===========================================================
   CLASSIFICA CONDIVISA (online) — opzionale
   Incolla qui i 2 valori del tuo progetto Supabase e la
   classifica diventa unica per tutti i giocatori.
   Se li lasci vuoti, il gioco usa la classifica locale.
   =========================================================== */
const SUPABASE_URL="";  // es: https://abcd1234.supabase.co
const SUPABASE_KEY="";  // chiave "anon public"
const SHARED=!!(SUPABASE_URL&&SUPABASE_KEY);
let selBelt=4, selDiff="medio"; // default: Verde-Blu · Medio
let playerName="Ospite";

/* ====== BANCO DOMANDE  (belt = cintura minima, lvl = difficoltà 1/2/3) ======
   Mappa forme→cinture: 1 Gialla=Chon-Ji · 2 Gialla sup=Dan-Gun/Do-San ·
   3 Verde=Won-Hyo · 4 Verde-Blu=Yul-Gok · 5 Blu=Joong-Gun ·
   6 Blu sup=Toi-Gye · 7 Rossa=Hwa-Rang · 8 Nera=Choong-Moo */
const POOL=[
  // STORIA & TEORIA
  {cat:"📜 Storia & Teoria",belt:1,lvl:1,q:"Chi è il fondatore del Taekwon-Do?",options:["Il Generale Choi Hong Hi","Bruce Lee","Ahn Chang Ho","Il monaco Won-Hyo"],answer:0,explain:"Creato dal Generale coreano Choi Hong Hi, 'il padre del Taekwon-Do'."},
  {cat:"📜 Storia & Teoria",belt:1,lvl:1,q:"Da quale Paese arriva il Taekwon-Do?",options:["Corea","Giappone","Cina","Thailandia"],answer:0,explain:"È un'arte marziale coreana di difesa personale."},

/* ====== UTIL ====== */
const $=id=>document.getElementById(id);
const shuffle=a=>{const x=a.slice();for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;};
const beltById=id=>BELTS.find(b=>b.id==id);
function beltDotHTML(b){const s=b.stripe?`<span class="str" style="background:${b.stripe}"></span>`:"";return `<span class="lb-dot" style="background:${b.main}">${s}</span>`;}

/* ====== START: selettori ====== */
function buildBeltGrid(){
  const g=$("beltGrid");g.innerHTML="";
  BELTS.forEach(b=>{
    const d=document.createElement("button");
    d.className="belt-opt"+(b.id===selBelt?" sel":"");
    const str=b.stripe?`<span class="str" style="background:${b.stripe}"></span>`:"";
    d.innerHTML=`<div class="mini" style="background:${b.main}">${str}</div>${b.name}<div class="tick">✓</div>`;
    d.onclick=()=>{selBelt=b.id;buildBeltGrid();updateBadge();};
    g.appendChild(d);
  });
}
function buildDiffGrid(){
  const g=$("diffGrid");g.innerHTML="";
  Object.keys(DIFF).forEach(k=>{
    const t=DIFF[k];const d=document.createElement("button");
    d.className="diff-opt"+(k===selDiff?" sel":"");
    d.innerHTML=`<div class="em">${t.em}</div><div class="nm">${t.nm}</div><div class="ds">${t.ds}</div>`;
    d.onclick=()=>{selDiff=k;buildDiffGrid();};
    g.appendChild(d);
  });
}
function updateBadge(){
  const b=beltById(selBelt);
  $("badgeBand").setAttribute("fill",b.main);
  $("badgeStripe").setAttribute("fill",b.stripe||b.main);
  $("badgeStripe").setAttribute("opacity",b.stripe?"1":"0");
}

/* ====== PARTITA ====== */
let game=[],idx=0,score=0,answered=false,soundOn=true,wrongList=[],QLEN=15;
function buildGame(){
  const maxLvl=DIFF[selDiff].maxLvl;
  let avail=POOL.filter(q=>q.belt<=selBelt&&q.lvl<=maxLvl);
  const byCat={};avail.forEach(q=>{(byCat[q.cat]=byCat[q.cat]||[]).push(q);});
  const cats=shuffle(Object.keys(byCat));
  Object.keys(byCat).forEach(c=>byCat[c]=shuffle(byCat[c]));
  const picked=[];let safety=0;const target=Math.min(DIFF[selDiff].count,avail.length);
  while(picked.length<target&&safety<800){
    for(const c of cats){if(byCat[c].length)picked.push(byCat[c].pop());if(picked.length>=target)break;}
    safety++;
  }
  QLEN=picked.length;
  return shuffle(picked).map(q=>{const correct=q.options[q.answer];const opts=shuffle(q.options);return {...q,options:opts,answer:opts.indexOf(correct)};});
}

/* ====== SUONO ====== */
let actx=null;
function beep(type){if(!soundOn)return;try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const seq=type==="good"?[[660,0],[990,.1]]:[[300,0],[160,.13]];
  seq.forEach(([f,t])=>{const o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=f;
    o.connect(g);g.connect(actx.destination);const s=actx.currentTime+t;g.gain.setValueAtTime(.0001,s);
    g.gain.exponentialRampToValueAtTime(.22,s+.02);g.gain.exponentialRampToValueAtTime(.0001,s+.18);
    o.start(s);o.stop(s+.2);});}catch(e){}}

/* ====== TIMER ====== */
let timeLeft=TIME_PER_Q,timerId=null;
function startTimer(){clearInterval(timerId);timeLeft=TIME_PER_Q;paintTimer();
  timerId=setInterval(()=>{timeLeft=Math.max(0,timeLeft-0.1);paintTimer();if(timeLeft<=0){clearInterval(timerId);reveal(null);}},100);}
function stopTimer(){clearInterval(timerId);}
function paintTimer(){const pct=timeLeft/TIME_PER_Q*100;const f=$("timeFill");
  f.style.width=pct+"%";f.style.background=pct>50?"#22c55e":pct>25?"#fbbf24":"#ef4444";
  const n=$("timeNum");n.textContent=Math.ceil(timeLeft);n.classList.toggle("warn",timeLeft<=3&&timeLeft>0);}

/* ====== SCHERMATE ====== */
function show(s){["screen-start","screen-quiz","screen-end"].forEach(x=>$(x).classList.add("hidden"));
  const el=$(s);el.classList.remove("hidden");el.classList.remove("screen");void el.offsetWidth;el.classList.add("screen");}

function startGame(){
  playerName=($("playerName").value.trim()||"Ospite").slice(0,18);
  game=buildGame();idx=0;score=0;wrongList=[];renderBeltTag();show("screen-quiz");render();
}

function renderBeltTag(){const b=beltById(selBelt);
  const str=b.stripe?`<span class="str" style="background:${b.stripe}"></span>`:"";
  $("beltTag").innerHTML=`<span class="dot" style="background:${b.main}">${str}</span>${b.name}`;}

function render(){
  answered=false;const q=game[idx];
  $("qcounter").textContent=`Domanda ${idx+1} / ${QLEN}`;
  $("scorePill").textContent=`⭐ ${score}`;
  $("catPill").textContent=q.cat;
  $("questionText").textContent=q.q;
  const pct=Math.round(idx/QLEN*100);
  $("beltFill").style.width=pct+"%";$("knot").style.left=pct+"%";$("beltPct").textContent=`Cintura ${pct}%`;
  const box=$("answers");box.innerHTML="";const L=["A","B","C","D"];
  q.options.forEach((opt,i)=>{const b=document.createElement("button");b.className="ans";b.style.animationDelay=(i*.05)+"s";
    b.innerHTML=`<span class="tag">${L[i]}</span><span class="txt">${opt}</span><span class="mark"></span>`;
    b.onclick=()=>reveal(i);box.appendChild(b);});
  $("feedback").className="feedback";$("feedback").innerHTML="";
  $("nextBtn").classList.remove("show");
  $("nextBtn").textContent=(idx===QLEN-1)?"Vedi risultato 🏆":"Avanti →";
  startTimer();
}

function reveal(i){
  if(answered)return;answered=true;stopTimer();
  const q=game[idx];const btns=[...document.querySelectorAll(".ans")];
  btns.forEach((b,bi)=>{b.classList.add("locked");
    if(bi===q.answer){b.classList.add("correct");b.querySelector(".mark").textContent="✅";}
    else if(bi!==i)b.classList.add("dim");});
  const fb=$("feedback");
  if(i===q.answer){score++;beep("good");burst();fb.className="feedback good show";
    fb.innerHTML=`<span class="h">✅ Esatto! ${praise()}</span>${q.explain}`;}
  else{beep("bad");if(i!==null){btns[i].classList.add("wrong");btns[i].querySelector(".mark").textContent="❌";}
    fb.className="feedback bad show";const head=(i===null)?"⏰ Tempo scaduto!":"Quasi!";
    fb.innerHTML=`<span class="h">${head}</span>La risposta giusta è <b>${q.options[q.answer]}</b>. ${q.explain}`;wrongList.push(q);}
  $("scorePill").textContent=`⭐ ${score}`;$("nextBtn").classList.add("show");
}
const praise=()=>["Grande!","Campione!","Bravissimo!","Ottimo!","Top!","Perfetto!"][Math.floor(Math.random()*6)];
function next(){idx<QLEN-1?(idx++,render()):endGame();}

function endGame(){
  stopTimer();show("screen-end");
  const pct=score/QLEN;
  $("ringScore").textContent=`${score}/${QLEN}`;
  const RING=389.6,off=RING*(1-pct),rf=$("ringFill");
  rf.style.transition="none";rf.style.strokeDashoffset=RING;
  setTimeout(()=>{rf.style.transition="stroke-dashoffset 1s cubic-bezier(.2,.9,.3,1)";rf.style.strokeDashoffset=off;},60);
  const beltName=beltById(selBelt).name;
  let emoji,title,stars,msg;
  if(pct>=.87){emoji="🏆";title="ESAME SUPERATO!";stars="⭐⭐⭐";msg=`Sei pronto per la cintura ${beltName}! Teoria, coreano e forme: tutto al loro posto. Fantastico!`;rain();}
  else if(pct>=.67){emoji="😀";title="Ci sei quasi!";stars="⭐⭐☆";msg="Molto bene! Ripassa le domande sbagliate e la prossima volta fai en plein.";}
  else{emoji="📚";title="Continua ad allenarti!";stars="⭐☆☆";msg="Ogni campione ha iniziato sbagliando. Ripassa il manuale e riprova. Spirito Indomito! 💪";}
  $("ringEmoji").textContent=emoji;$("endTitle").textContent=title;$("endStars").textContent=stars;$("endMsg").textContent=msg;
  $("reviewBox").classList.add("hidden");
  $("reviewBox").innerHTML=wrongList.length===0?"🎉 <b>Nessun errore!</b> Hai risposto bene a tutto. Sei un vero maestro!"
    :"<b>📖 Da ripassare:</b><br><br>"+wrongList.map(q=>`• <b>${q.q}</b><br>→ ${q.options[q.answer]}`).join("<br><br>");
  showLeaderboard();
}

/* ====== CLASSIFICA (online condivisa con fallback locale) ====== */
let memBoard=[],lastId=null;
function escapeHTML(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
const SB_HEAD=()=>({"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"});
function makeEntry(){return {name:playerName,score:score,total:QLEN,pct:Math.round(score/QLEN*100),belt:selBelt,diff:DIFF[selDiff].nm,ts:Date.now()};}

/* locale */
function loadLocal(){try{return JSON.parse(localStorage.getItem(LB_KEY))||[]}catch(e){return memBoard}}
function storeLocal(b){memBoard=b;try{localStorage.setItem(LB_KEY,JSON.stringify(b))}catch(e){}}

async function showLeaderboard(){
  const lb=$("leaderboard");lb.innerHTML='<div class="lb-empty">Carico la classifica… ⏳</div>';
  const entry=makeEntry();
  if(SHARED){
    try{
      const res=await fetch(SUPABASE_URL+"/rest/v1/scores",{method:"POST",
        headers:{...SB_HEAD(),"Prefer":"return=representation"},
        body:JSON.stringify({name:entry.name,score:entry.score,total:entry.total,pct:entry.pct,belt:entry.belt,diff:entry.diff})});
      if(!res.ok)throw new Error("post");
      const ins=await res.json();lastId=(ins&&ins[0]&&ins[0].id)||null;
      const r2=await fetch(SUPABASE_URL+"/rest/v1/scores?select=*&order=pct.desc,score.desc,created_at.asc&limit=100",{headers:SB_HEAD()});
      if(!r2.ok)throw new Error("get");
      const rows=await r2.json();
      renderRows(rows,lastId,"id",true);
      $("clearLbBtn").style.display="none";
      return;
    }catch(e){lb.innerHTML='<div class="lb-empty">⚠️ Classifica online non raggiungibile. Mostro quella locale.</div>';}
  }
  const board=loadLocal();entry.id="L"+Date.now()+Math.random().toString(36).slice(2,6);
  board.push(entry);board.sort((a,b)=>b.pct-a.pct||b.score-a.score||a.ts-b.ts);if(board.length>50)board.length=50;
  storeLocal(board);renderRows(board,entry.id,"id",false);
  $("clearLbBtn").style.display="block";
}

function renderRows(board,myId,key,online){
  const lb=$("leaderboard");lb.innerHTML="";
  if(!board||!board.length){lb.innerHTML='<div class="lb-empty">Ancora nessun punteggio. Sii il primo! 🥇</div>';return;}
  if(online){const tag=document.createElement("div");tag.className="lb-empty";tag.style.padding="0 0 4px";
    tag.textContent="🌍 Classifica online · tutti i giocatori";lb.appendChild(tag);}
  const medals=["🥇","🥈","🥉"];
  const top=board.slice(0,10);
  const myIndex=board.findIndex(e=>e[key]===myId);
  const rows=top.slice();let appended=false;
  if(myIndex>=10){rows.push(board[myIndex]);appended=true;}
  rows.forEach((e,i)=>{
    const rank=(appended&&i===rows.length-1)?myIndex:i;
    const b=beltById(e.belt)||{main:"#cbd5e1",stripe:null,name:"-"};
    const row=document.createElement("div");
    row.className="lb-row"+(e[key]===myId?" me":"");
    row.innerHTML=`<span class="lb-rank">${medals[rank]||(rank+1)}</span>${beltDotHTML(b)}<span class="lb-name">${escapeHTML(e.name)}</span><span class="lb-meta">${b.name} · ${e.diff}</span><span class="lb-pts">${e.score}/${e.total}</span>`;
    lb.appendChild(row);
  });
}

/* ====== CORIANDOLI ====== */
const cv=$("confetti"),cx=cv.getContext("2d");let parts=[],raf=null;
function size(){cv.width=innerWidth;cv.height=innerHeight;}size();addEventListener("resize",size);
const COLORS=["#22c55e","#3b82f6","#fbbf24","#ef4444","#14b8a6","#a855f7"];
function spawn(n,big){for(let i=0;i<n;i++)parts.push({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight/2-60,
  vx:(Math.random()-.5)*(big?14:9),vy:(Math.random()*-1-(big?7:5)),g:.22,s:Math.random()*7+4,
  c:COLORS[Math.floor(Math.random()*COLORS.length)],rot:Math.random()*6,vr:(Math.random()-.5)*.3,life:big?120:70});}
function loop(){cx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life--;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.5);cx.restore();});
  parts=parts.filter(p=>p.life>0&&p.y<cv.height+30);
  if(parts.length)raf=requestAnimationFrame(loop);else{cx.clearRect(0,0,cv.width,cv.height);raf=null;}}
function burst(){spawn(18,false);if(!raf)loop();}
function rain(){spawn(120,true);if(!raf)loop();}

/* ====== EVENTI ====== */
buildBeltGrid();buildDiffGrid();updateBadge();
$("startBtn").onclick=startGame;
$("playerName").addEventListener("keydown",e=>{if(e.key==="Enter")startGame();});
$("nextBtn").onclick=next;
$("againBtn").onclick=startGame;
$("homeBtn").onclick=()=>{stopTimer();show("screen-start");};
$("restartBtn").onclick=()=>{stopTimer();startGame();};
$("reviewBtn").onclick=()=>$("reviewBox").classList.toggle("hidden");
$("clearLbBtn").onclick=()=>{if(confirm("Vuoi cancellare la classifica locale di questo dispositivo?")){storeLocal([]);renderRows([],null,"id",false);}};
$("muteBtn").onclick=()=>{soundOn=!soundOn;$("muteBtn").textContent=soundOn?"🔊":"🔇";};
</script>
